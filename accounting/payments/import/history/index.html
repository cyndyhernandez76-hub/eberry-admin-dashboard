<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eBerry — Payment Import History</title>
<link rel="icon" href="/eberry-admin-dashboard/favicon.svg">
<meta name="theme-color" content="#6b8f71">
<!--
  Payment import history. Lists recent runs from accounting.payment_import_runs,
  or shows a single saved run when opened as .../history/?run=<run_id>.
  CONFIG: Expects window.__APP_CONFIG__ = { SUPABASE_URL, SUPABASE_ANON_KEY }
-->
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f7f4;color:#1a2b1c;font-size:14px;line-height:1.5}
:root{--sage:#6b8f71;--sage-dark:#4f6e54;--sage-light:#eaf2eb;--sage-border:#b5c9b8;--sage-bg:#f2f7f3;--text:#1a2b1c;--text2:#4a5e4c;--text3:#7a907c;--border:#d4e4d6;--surface:#ffffff;--radius:8px;--radius-lg:12px}
.container{max-width:1100px;margin:0 auto;padding:1.25rem}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;gap:12px;flex-wrap:wrap}
.topbar-left h1{font-size:21px;font-weight:700}
.topbar-left p{font-size:13px;color:var(--text3);margin-top:2px}
.btn-launcher{display:inline-flex;align-items:center;gap:6px;background:var(--sage-light);color:var(--sage-dark);border:1px solid var(--sage-border);padding:0 12px;height:30px;border-radius:var(--radius);font-size:12px;font-weight:500;text-decoration:none;margin-bottom:6px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:16px}
.card h2{font-size:15px;font-weight:700;margin-bottom:8px}
table{width:100%;border-collapse:collapse}
thead{background:var(--sage-bg)}
th{padding:9px 11px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 11px;border-bottom:1px solid #edf2ed;font-size:13px}
tr:last-child td{border-bottom:none}
tbody tr.clk{cursor:pointer}
tbody tr.clk:hover td{background:#f8fbf8}
.mono{font-family:monospace;font-size:12px}
.amount{text-align:right;font-family:monospace;font-weight:600}
.pill{font-size:12px;font-weight:600;padding:4px 10px;border-radius:12px;border:1px solid var(--sage-border);background:var(--sage-light);color:var(--sage-dark);margin-right:6px}
.pill.ok{background:#e8f5e9;border-color:#a5d6a7;color:#1b5e20}
.pill.err{background:#fdecec;border-color:#f5b5b5;color:#c62828}
.row-error td{background:#fdf2f2}
.match.ok{color:#1b5e20;font-weight:600}.match.err{color:#c62828;font-weight:600}
.empty{padding:40px 20px;text-align:center;color:var(--text3)}
.banner{padding:12px 16px;border-radius:var(--radius);margin-bottom:14px;font-size:13px;display:none}
.banner.show{display:block}.banner.error{background:#fff5f5;border:1px solid #f5c6c6;color:#c62828}
.loader{display:inline-block;width:14px;height:14px;border:2px solid var(--sage-border);border-top-color:var(--sage);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.muted{color:var(--text3)}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="topbar-left">
      <a href="/eberry-admin-dashboard/accounting/payments/import/" class="btn-launcher">← Import Payments</a>
      <h1 id="page-title">Payment Import History</h1>
      <p id="page-sub">Past payment reconciliation runs</p>
    </div>
    <div class="topbar-right"><span class="btn-launcher" id="auth-pill">…</span></div>
  </div>
  <div id="banner" class="banner"></div>
  <div id="content"><div class="card"><div class="empty"><span class="loader"></span> Loading…</div></div></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const cfg = window.__APP_CONFIG__ || {};
const sb = createClient(cfg.SUPABASE_URL || 'https://opdwtijyropzoyeseoij.supabase.co', cfg.SUPABASE_ANON_KEY || '',
  { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:false } });

function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMoney(n){ if(n==null||n==='') return '—'; return Number(n).toLocaleString('en-US',{style:'currency',currency:'USD'}); }
function fmtTs(t){ return t ? new Date(t).toLocaleString() : '—'; }
function showBanner(m){ const el=document.getElementById('banner'); el.textContent=m; el.className='banner show error'; }

async function loadList(){
  const { data, error } = await sb.schema('accounting').from('payment_import_runs')
    .select('run_id,imported_at,filename,result').order('imported_at',{ascending:false}).limit(100);
  if (error){ showBanner('Failed to load history: '+error.message); document.getElementById('content').innerHTML=''; return; }
  if (!data || !data.length){
    document.getElementById('content').innerHTML = '<div class="card"><div class="empty">No import runs yet.</div></div>';
    return;
  }
  const rows = data.map(r => {
    const res = r.result || {};
    return `<tr class="clk" data-id="${r.run_id}">
      <td>${fmtTs(r.imported_at)}</td>
      <td>${escapeHtml(r.filename||'—')}</td>
      <td>${res.total ?? '—'}</td>
      <td class="match ok">${res.ok_count ?? 0}</td>
      <td class="match err">${res.fail_count ?? 0}</td>
      <td class="mono muted">${escapeHtml(String(r.run_id).slice(0,8))}…</td>
    </tr>`;
  }).join('');
  document.getElementById('content').innerHTML = `
    <div class="card"><h2>Recent runs</h2>
      <table><thead><tr><th>Imported</th><th>File</th><th>Rows</th><th>OK</th><th>Failed</th><th>Run</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
  document.querySelectorAll('tr.clk').forEach(tr =>
    tr.onclick = () => location.search = '?run=' + tr.dataset.id);
}

async function loadRun(runId){
  document.getElementById('page-title').textContent = 'Import Run';
  const { data, error } = await sb.schema('accounting').from('payment_import_runs')
    .select('*').eq('run_id', runId).maybeSingle();
  if (error || !data){ showBanner('Run not found: '+(error?.message||runId)); document.getElementById('content').innerHTML=''; return; }
  document.getElementById('page-sub').textContent = `${data.filename||'(no file)'} · ${fmtTs(data.imported_at)}`;
  const res = data.result || {};
  const results = res.results || [];
  const rows = results.map(r => `
    <tr class="${r.status==='ok'?'':'row-error'}">
      <td>${r.row}</td>
      <td class="mono">${escapeHtml(r.invoice_number||'—')}</td>
      <td class="match ${r.status==='ok'?'ok':'err'}">${r.status==='ok'?'✓ ok':'✗ error'}</td>
      <td>${escapeHtml(r.new_status||'—')}</td>
      <td class="amount">${r.new_amount_due!=null?fmtMoney(r.new_amount_due):'—'}</td>
      <td class="muted">${escapeHtml(r.error||'')}</td>
    </tr>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div style="margin-bottom:10px">
        <span class="pill">${res.total ?? results.length} submitted</span>
        <span class="pill ok">${res.ok_count ?? 0} recorded</span>
        ${res.fail_count ? `<span class="pill err">${res.fail_count} failed</span>`:''}
      </div>
      <table><thead><tr><th>#</th><th>Invoice #</th><th>Status</th><th>New bill status</th><th style="text-align:right">New amount due</th><th>Detail</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="6" class="empty">No per-row results stored.</td></tr>'}</tbody></table>
      <p class="muted" style="margin-top:12px"><a class="btn-launcher" href="?">← All runs</a></p>
    </div>`;
}

window.addEventListener('DOMContentLoaded', async () => {
  try { const { data:{ user } } = await sb.auth.getUser(); document.getElementById('auth-pill').textContent = user?.email || 'Not signed in'; }
  catch(_) { document.getElementById('auth-pill').textContent = 'Auth error'; }
  const runId = new URLSearchParams(location.search).get('run');
  if (runId) loadRun(runId); else loadList();
});
</script>
</body>
</html>
