<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eBerry — Accounts Payable Report</title>
<link rel="icon" href="/eberry-admin-dashboard/favicon.svg">
<meta name="theme-color" content="#6b8f71">
<!--
  Accounts Payable Report (SOP: Jackie prepares → Cuco approves → Jona pays).
  Reads public.admin_get_ap_report(...). Exports XLSX + CSV with the SOP columns.
  CONFIG: Expects window.__APP_CONFIG__ = { SUPABASE_URL, SUPABASE_ANON_KEY }
-->
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f7f4;color:#1a2b1c;font-size:14px;line-height:1.5}
:root{
--sage:#6b8f71;--sage-dark:#4f6e54;--sage-light:#eaf2eb;
--sage-border:#b5c9b8;--sage-bg:#f2f7f3;--sage-muted:#6b8a6e;
--text:#1a2b1c;--text2:#4a5e4c;--text3:#7a907c;
--border:#d4e4d6;--surface:#ffffff;--radius:8px;--radius-lg:12px
}
.container{max-width:1400px;margin:0 auto;padding:1.25rem}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;gap:12px;flex-wrap:wrap}
.topbar-left h1{font-size:21px;font-weight:700;color:var(--text)}
.topbar-left p{font-size:13px;color:var(--text3);margin-top:2px}
.btn-launcher{display:inline-flex;align-items:center;gap:6px;background:var(--sage-light);color:var(--sage-dark);border:1px solid var(--sage-border);padding:0 12px;height:30px;border-radius:var(--radius);font-size:12px;font-weight:500;text-decoration:none;margin-bottom:6px}
.btn-launcher:hover{background:#dde8df}
.topbar-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.auth-pill{font-size:11px;color:var(--text3);background:var(--sage-light);border:1px solid var(--sage-border);border-radius:12px;padding:3px 10px;font-weight:500}
button{cursor:pointer;font-family:inherit;font-size:14px;border-radius:var(--radius);transition:all .15s}
.btn-primary{background:var(--sage);color:#fff;border:none;padding:0 16px;height:36px;font-weight:500}
.btn-primary:hover{background:var(--sage-dark)}
.btn-primary:disabled{background:#b5c9b8;cursor:not-allowed}
.btn-secondary{background:var(--surface);color:var(--text2);border:1px solid var(--sage-border);padding:0 14px;height:36px}
.btn-secondary:hover{background:var(--sage-light)}

.stat-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-bottom:1.1rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.stat-value{font-size:19px;font-weight:700;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.stat.pastdue{background:#fdecec;border-color:#f5b5b5}
.stat.pastdue .stat-value{color:#c62828}
.stat.week{background:#fff8e8;border-color:#f0d080}
.stat.week .stat-value{color:#b07d00}
.stat.total .stat-value{color:var(--sage-dark)}

.filters{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:1rem;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.field input,.field select{height:34px;border:1px solid var(--sage-border);border-radius:var(--radius);background:var(--surface);color:var(--text);padding:0 10px;font-size:14px;outline:none;font-family:inherit}
.field input:focus,.field select:focus{border-color:var(--sage)}
.field.search input{min-width:200px}
.field.check{flex-direction:row;align-items:center;gap:6px;height:34px}
.field.check label{text-transform:none;font-size:13px;font-weight:500;color:var(--text2)}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:auto}
table{width:100%;border-collapse:collapse}
thead{background:var(--sage-bg)}
th{padding:10px 13px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 13px;border-bottom:1px solid #edf2ed;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer}
tbody tr:hover td{background:#f8fbf8}
.inv-no{font-family:monospace;font-size:12px;font-weight:700;color:var(--sage-dark)}
.amount{text-align:right;font-family:monospace;font-weight:600}
.desc-cell{max-width:280px;font-size:13px;color:var(--text2)}
.bucket{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.05em}
.b-past_due{background:#fdecec;color:#c62828;border:1px solid #f5b5b5}
.b-due_this_week{background:#fff8e8;color:#b07d00;border:1px solid #f0d080}
.b-upcoming{background:#eef2ee;color:#5a6e5c;border:1px solid #d4e4d6}
.status-pill{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.05em;background:#eef2ee;color:#4f6e54;border:1px solid #cfe0d1}

.empty{padding:60px 20px;text-align:center;color:var(--text3)}
.empty-icon{font-size:42px;margin-bottom:10px}
.banner{padding:12px 16px;border-radius:var(--radius);margin-bottom:14px;font-size:13px;display:none}
.banner.show{display:block}
.banner.error{background:#fff5f5;border:1px solid #f5c6c6;color:#c62828}
.banner.info{background:#e3f2fd;border:1px solid #90caf9;color:#0d47a1}
.loader{display:inline-block;width:14px;height:14px;border:2px solid var(--sage-border);border-top-color:var(--sage);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.muted{color:var(--text3)}

.drawer-backdrop{position:fixed;inset:0;background:rgba(26,43,28,.5);display:none;align-items:flex-start;justify-content:flex-end;z-index:100;backdrop-filter:blur(2px)}
.drawer-backdrop.open{display:flex}
.drawer{width:min(560px,100vw);height:100vh;background:var(--surface);overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,.15);animation:slideIn .25s ease-out}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-head{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:5}
.drawer-head h2{font-size:17px;font-weight:700}
.drawer-head .sub{font-size:12px;color:var(--text3);margin-top:2px}
.x-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.drawer-body{padding:18px 20px 60px}
.kv{display:grid;grid-template-columns:150px 1fr;gap:6px 12px;font-size:13px}
.kv dt{color:var(--text3);font-weight:600}
.kv dd{color:var(--text)}
.drawer-open-link{display:inline-block;margin-top:16px;color:var(--sage-dark);font-weight:600;font-size:13px}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="topbar-left">
      <a href="/eberry-admin-dashboard/" class="btn-launcher">← Dashboard</a>
      <h1>Accounts Payable Report</h1>
      <p>Weekly payables snapshot · prepared by Jackie · approved by Cuco · paid by Jona</p>
    </div>
    <div class="topbar-right">
      <span class="auth-pill" id="auth-pill">…</span>
      <a class="btn-launcher" href="/eberry-admin-dashboard/accounting/payments/import/">Import Payments →</a>
      <button class="btn-secondary" id="refresh-btn">Refresh</button>
      <button class="btn-secondary" id="csv-btn">Export CSV</button>
      <button class="btn-primary" id="xlsx-btn">Export to Excel (.xlsx)</button>
    </div>
  </div>

  <div id="banner" class="banner"></div>

  <div class="stat-bar" id="stat-bar"></div>

  <div class="filters">
    <div class="field">
      <label>Due before</label>
      <input id="f-due" type="date">
    </div>
    <div class="field">
      <label>Status</label>
      <select id="f-status">
        <option value="">All unpaid</option>
        <option value="open">Open</option>
        <option value="partial">Partial</option>
        <option value="overdue">Overdue</option>
        <option value="draft">Draft</option>
      </select>
    </div>
    <div class="field" id="farm-field" style="display:none">
      <label>Farm</label>
      <select id="f-farm"><option value="">All farms</option></select>
    </div>
    <div class="field search">
      <label>Vendor / invoice search</label>
      <input id="f-vendor" type="text" placeholder="Vendor name, invoice #, description…" autocomplete="off">
    </div>
    <div class="field check">
      <input id="f-draft" type="checkbox">
      <label for="f-draft">Include drafts</label>
    </div>
    <button class="btn-primary" id="apply-btn">Apply</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Vendor Name</th>
          <th style="width:130px">Invoice #</th>
          <th style="width:105px">Invoice Date</th>
          <th style="width:105px">Due Date</th>
          <th style="width:110px;text-align:right">Amount Due</th>
          <th>Description</th>
          <th style="width:90px">Status</th>
          <th style="width:120px">Due Bucket</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="8" class="empty"><span class="loader"></span> Loading payables…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="drawer-backdrop" id="drawer-backdrop">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-head">
      <div><h2 id="drawer-title">Bill</h2><div class="sub" id="drawer-sub"></div></div>
      <button class="x-btn" id="drawer-close">×</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
// xlsx-js-style is a SheetJS-compatible build that also supports bold headers,
// number formats and frozen panes on write (the plain community build cannot).
import * as XLSX from 'https://esm.sh/xlsx-js-style@1.2.0';

const cfg = window.__APP_CONFIG__ || {};
const SUPABASE_URL = cfg.SUPABASE_URL || 'https://opdwtijyropzoyeseoij.supabase.co';
const SUPABASE_KEY = cfg.SUPABASE_ANON_KEY || '';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
});

let allRows = [];      // rows returned from the RPC (server-filtered)
let viewRows = [];     // after client-side vendor/search filter

function fmtMoney(n){ if(n==null) return '—'; return Number(n).toLocaleString('en-US',{style:'currency',currency:'USD'}); }
function fmtDate(d){ return d ? String(d).slice(0,10) : '—'; }
function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showBanner(msg,kind='info'){ const el=document.getElementById('banner'); el.textContent=msg; el.className=`banner show ${kind}`; }
function hideBanner(){ document.getElementById('banner').classList.remove('show'); }
function todayPlus(days){ const d=new Date(); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }
function today(){ return new Date().toISOString().slice(0,10); }

async function loadFarms(){
  // Best-effort: the farms table location varies by deployment. If it fails,
  // the farm filter stays hidden and everything else works.
  try {
    const { data, error } = await sb.schema('accounting').from('farms')
      .select('farm_id,farm_name,farm_code').order('farm_name');
    if (error || !data || !data.length) return;
    const sel = document.getElementById('f-farm');
    for (const f of data) {
      const o = document.createElement('option');
      o.value = f.farm_id;
      o.textContent = f.farm_name + (f.farm_code ? ` (${f.farm_code})` : '');
      sel.appendChild(o);
    }
    document.getElementById('farm-field').style.display = '';
  } catch (_) { /* no farms table reachable — skip */ }
}

async function loadReport(){
  document.getElementById('rows').innerHTML =
    `<tr><td colspan="8" class="empty"><span class="loader"></span> Loading payables…</td></tr>`;
  hideBanner();
  const due = document.getElementById('f-due').value || null;
  const status = document.getElementById('f-status').value || null;
  const farm = document.getElementById('f-farm').value || null;
  const includeDraft = document.getElementById('f-draft').checked;

  const { data, error } = await sb.rpc('admin_get_ap_report', {
    p_due_before: due,
    p_status: status,
    p_farm_id: farm,
    p_vendor_id: null,
    p_include_draft: includeDraft
  });
  if (error) {
    document.getElementById('rows').innerHTML =
      `<tr><td colspan="8" class="empty">Failed to load: ${escapeHtml(error.message)}</td></tr>`;
    showBanner(`Failed to load AP report: ${error.message}`, 'error');
    return;
  }
  allRows = data || [];
  applySearch();
}

function applySearch(){
  const q = document.getElementById('f-vendor').value.trim().toLowerCase();
  viewRows = !q ? allRows.slice() : allRows.filter(r =>
    (r.vendor_name||'').toLowerCase().includes(q) ||
    (r.invoice_number||'').toLowerCase().includes(q) ||
    (r.description_of_expense||'').toLowerCase().includes(q)
  );
  renderStats();
  renderTable();
}

function renderStats(){
  let totalDue=0, pastN=0, pastAmt=0, weekN=0, weekAmt=0;
  for (const r of viewRows){
    const amt = Number(r.amount_due||0);
    totalDue += amt;
    if (r.due_bucket==='past_due'){ pastN++; pastAmt+=amt; }
    else if (r.due_bucket==='due_this_week'){ weekN++; weekAmt+=amt; }
  }
  document.getElementById('stat-bar').innerHTML = `
    <div class="stat"><div class="stat-label"># Bills to Pay</div><div class="stat-value">${viewRows.length}</div></div>
    <div class="stat total"><div class="stat-label">Total Amount Due</div><div class="stat-value">${fmtMoney(totalDue)}</div></div>
    <div class="stat pastdue"><div class="stat-label">Past Due</div><div class="stat-value">${pastN}</div><div class="stat-sub">${fmtMoney(pastAmt)}</div></div>
    <div class="stat week"><div class="stat-label">Due This Week</div><div class="stat-value">${weekN}</div><div class="stat-sub">${fmtMoney(weekAmt)}</div></div>
  `;
}

function renderTable(){
  if (!viewRows.length){
    document.getElementById('rows').innerHTML =
      `<tr><td colspan="8" class="empty"><div class="empty-icon">✅</div>No payables match these filters.</td></tr>`;
    return;
  }
  document.getElementById('rows').innerHTML = viewRows.map((r,i)=>{
    const bucket = r.due_bucket || 'upcoming';
    return `<tr data-i="${i}">
      <td>${escapeHtml(r.vendor_name||'—')}</td>
      <td><span class="inv-no">${escapeHtml(r.invoice_number||'—')}</span></td>
      <td>${fmtDate(r.invoice_date)}</td>
      <td>${fmtDate(r.due_date)}</td>
      <td class="amount">${fmtMoney(r.amount_due)}</td>
      <td class="desc-cell">${escapeHtml(r.description_of_expense||'—')}</td>
      <td><span class="status-pill">${escapeHtml(r.status||'')}</span></td>
      <td><span class="bucket b-${bucket}">${bucket.replace(/_/g,' ')}</span></td>
    </tr>`;
  }).join('');
  document.querySelectorAll('#rows tr[data-i]').forEach(tr =>
    tr.onclick = () => openDrawer(viewRows[Number(tr.dataset.i)]));
}

function openDrawer(r){
  document.getElementById('drawer-backdrop').classList.add('open');
  document.getElementById('drawer-title').textContent = r.invoice_number || 'Bill';
  document.getElementById('drawer-sub').textContent = r.vendor_name || '';
  document.getElementById('drawer-body').innerHTML = `
    <dl class="kv">
      <dt>Vendor</dt><dd>${escapeHtml(r.vendor_name||'—')}</dd>
      <dt>Invoice #</dt><dd>${escapeHtml(r.invoice_number||'—')}</dd>
      <dt>Invoice date</dt><dd>${fmtDate(r.invoice_date)}</dd>
      <dt>Due date</dt><dd>${fmtDate(r.due_date)}</dd>
      <dt>Status</dt><dd>${escapeHtml(r.status||'—')}</dd>
      <dt>Due bucket</dt><dd>${(r.due_bucket||'—').replace(/_/g,' ')}</dd>
      <dt>Total amount</dt><dd>${fmtMoney(r.total_amount)}</dd>
      <dt>Amount paid</dt><dd>${fmtMoney(r.amount_paid)}</dd>
      <dt>Amount due</dt><dd><strong>${fmtMoney(r.amount_due)}</strong></dd>
      <dt>GL account</dt><dd>${escapeHtml(r.gl_account_code||'—')}</dd>
      <dt>Description</dt><dd>${escapeHtml(r.description_of_expense||'—')}</dd>
      <dt>Management notes</dt><dd>${escapeHtml(r.management_notes||'—')}</dd>
      ${r.dispute_notes ? `<dt>Dispute notes</dt><dd>${escapeHtml(r.dispute_notes)}</dd>` : ''}
    </dl>
    <a class="drawer-open-link" href="/eberry-admin-dashboard/accounting/bills/${encodeURIComponent(r.bill_id)}">Open bill in ledger →</a>
  `;
}
function closeDrawer(){ document.getElementById('drawer-backdrop').classList.remove('open'); }

// ─────────── Export helpers (SOP columns) ───────────
const SOP_HEADERS = ['Vendor Name','Invoice Number','Invoice Date','Due Date','Amount Due','Description of Expense','Notes for Management'];
function rowToSop(r){
  return [
    r.vendor_name || '',
    r.invoice_number || '',
    fmtDate(r.invoice_date)==='—' ? '' : fmtDate(r.invoice_date),
    fmtDate(r.due_date)==='—' ? '' : fmtDate(r.due_date),
    Number(r.amount_due||0),
    r.description_of_expense || '',
    r.management_notes || ''
  ];
}
const CAPTION = 'Prepared by: Jackie Gonzalez   |   Approved by: ____________   |   Date: __________';

function exportCsv(){
  if (!viewRows.length){ showBanner('Nothing to export — no rows in view.', 'info'); return; }
  const esc = v => {
    const s = String(v==null?'':v);
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  };
  const lines = [];
  lines.push(esc('Accounts Payable Report'));
  lines.push(esc(CAPTION));
  lines.push('');
  lines.push(SOP_HEADERS.map(esc).join(','));
  for (const r of viewRows) lines.push(rowToSop(r).map(esc).join(','));
  const blob = new Blob([lines.join('\r\n')], { type:'text/csv;charset=utf-8;' });
  downloadBlob(blob, `AP_Report_${today()}.csv`);
}

function exportXlsx(){
  if (!viewRows.length){ showBanner('Nothing to export — no rows in view.', 'info'); return; }
  const aoa = [
    ['Accounts Payable Report'],
    [CAPTION],
    [],
    SOP_HEADERS,
    ...viewRows.map(rowToSop)
  ];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const HEADER_ROW = 3;           // zero-based row index of the column headers
  const AMOUNT_COL = 4;           // "Amount Due"
  // Column widths
  ws['!cols'] = [{wch:26},{wch:18},{wch:13},{wch:13},{wch:14},{wch:40},{wch:34}];
  // Freeze everything above the first data row (keeps the header row visible).
  ws['!freeze'] = { xSplit:0, ySplit:HEADER_ROW+1, topLeftCell:'A5', activePane:'bottomLeft', state:'frozen' };
  ws['!views'] = [{ state:'frozen', ySplit:HEADER_ROW+1 }];
  // Title + caption styling
  styleCell(ws, 0, 0, { font:{ bold:true, sz:14 } });
  styleCell(ws, 1, 0, { font:{ italic:true, sz:10, color:{rgb:'6B6B6B'} } });
  // Bold header row
  for (let c=0;c<SOP_HEADERS.length;c++){
    styleCell(ws, HEADER_ROW, c, {
      font:{ bold:true, color:{rgb:'FFFFFF'} },
      fill:{ fgColor:{ rgb:'4F6E54' } },
      alignment:{ horizontal: c===AMOUNT_COL ? 'right' : 'left' }
    });
  }
  // Currency format on Amount Due data cells
  for (let i=0;i<viewRows.length;i++){
    styleCell(ws, HEADER_ROW+1+i, AMOUNT_COL, { numFmt:'"$"#,##0.00' });
  }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'AP Report');
  XLSX.writeFile(wb, `AP_Report_${today()}.xlsx`);
}

function styleCell(ws, r, c, style){
  const ref = XLSX.utils.encode_cell({ r, c });
  if (!ws[ref]) ws[ref] = { t:'s', v:'' };
  ws[ref].s = Object.assign({}, ws[ref].s, style);
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

// ─────────── Wire-up ───────────
window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('f-due').value = todayPlus(7);
  try {
    const { data:{ user } } = await sb.auth.getUser();
    document.getElementById('auth-pill').textContent = user?.email || 'Not signed in';
    if (!user) showBanner('You are not signed in. Sign in to load payables.', 'error');
  } catch(_) { document.getElementById('auth-pill').textContent = 'Auth error'; }

  document.getElementById('apply-btn').onclick = loadReport;
  document.getElementById('refresh-btn').onclick = loadReport;
  document.getElementById('f-vendor').addEventListener('input', applySearch);
  document.getElementById('csv-btn').onclick = exportCsv;
  document.getElementById('xlsx-btn').onclick = exportXlsx;
  document.getElementById('drawer-close').onclick = closeDrawer;
  document.getElementById('drawer-backdrop').onclick = closeDrawer;
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeDrawer(); });

  await loadFarms();
  await loadReport();
});
</script>
</body>
</html>
