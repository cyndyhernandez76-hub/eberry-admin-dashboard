<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting to Operations &middot; eBerry</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f6f2;
        --surface: #ffffff;
        --text: #28251d;
        --muted: #7a7974;
        --border: #d4d1ca;
        --accent: #ea580c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #171614;
          --surface: #1c1b19;
          --text: #cdccca;
          --muted: #797876;
          --border: #393836;
          --accent: #fdab43;
        }
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        max-width: 460px;
        padding: 28px 28px 24px;
        text-align: center;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .pill {
        display: inline-block;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 14px;
      }
      h1 {
        font-size: 22px;
        font-weight: 600;
        margin: 0 0 10px;
      }
      p {
        font-size: 15px;
        color: var(--muted);
        line-height: 1.55;
        margin: 0 0 18px;
      }
      .spinner {
        width: 22px;
        height: 22px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
      }
      a:hover { text-decoration: underline; }
    </style>
    <script>
      // Hard redirect to the new Operations hub inside the SPA. The PO Tracker
      // is now a sub-route of Operations (Procurement tile). We jump to the
      // SPA's hash-routed entry point: `../#/m/ops`. We compute the URL
      // dynamically so it works from any deployed base path.
      (function () {
        try {
          var here = window.location.href;
          // Strip everything from "/po-tracker" onward, then append the hash
          // route to the SPA shell.
          var idx = here.indexOf("/po-tracker");
          var base = idx >= 0 ? here.slice(0, idx + 1) : "../";
          window.location.replace(base + "#/m/ops");
        } catch (e) {
          window.location.replace("../#/m/ops");
        }
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0; url=../#/m/ops" />
    </noscript>
  </head>
  <body>
    <div class="card" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <div class="pill">PO Tracker has moved</div>
      <h1>Taking you to Operations…</h1>
      <p>
        The PO Tracker now lives inside the eBerry Operations hub. If you're
        not redirected automatically,
        <a href="../#/m/ops">open Operations</a>.
      </p>
    </div>
  </body>
</html>
